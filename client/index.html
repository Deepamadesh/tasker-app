<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen" class="screen">
  <div class="auth-card">
    <h1>Tasker</h1>
    <div class="tab-row">
      <button class="tab active" data-tab="login">Login</button>
      <button class="tab" data-tab="register">Register</button>
    </div>
    <form id="auth-form">
      <input id="auth-username" type="text" placeholder="Username" required />
      <input id="auth-password" type="password" placeholder="Password" required />
      <div id="auth-error" class="error hidden"></div>
      <button type="submit" id="auth-btn">Login</button>
    </form>
  </div>
</div>

<!-- App Screen -->
<div id="app-screen" class="screen hidden">
  <header>
    <h1>Tasker</h1>
    <div class="header-right">
      <span id="welcome-msg"></span>
      <button id="logout-btn">Logout</button>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="filters">
        <select id="filter-status">
          <option value="">All Status</option>
          <option value="todo">Todo</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <select id="filter-priority">
          <option value="">All Priority</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <button id="new-task-btn">+ New Task</button>
    </section>

    <div id="task-board" class="board">
      <div class="column" data-status="todo">
        <h2>Todo <span class="count" id="count-todo">0</span></h2>
        <div class="task-list" id="list-todo"></div>
      </div>
      <div class="column" data-status="in-progress">
        <h2>In Progress <span class="count" id="count-in-progress">0</span></h2>
        <div class="task-list" id="list-in-progress"></div>
      </div>
      <div class="column" data-status="done">
        <h2>Done <span class="count" id="count-done">0</span></h2>
        <div class="task-list" id="list-done"></div>
      </div>
    </div>
  </main>
</div>

<!-- Task Modal -->
<div id="task-modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modal-title">New Task</h2>
    <form id="task-form">
      <input id="task-title" type="text" placeholder="Task title" required />
      <textarea id="task-desc" placeholder="Description (optional)" rows="3"></textarea>
      <div class="form-row">
        <select id="task-status">
          <option value="todo">Todo</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <select id="task-priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <input id="task-due" type="date" />
      </div>
      <div id="task-error" class="error hidden"></div>
      <div class="modal-actions">
        <button type="button" id="modal-cancel">Cancel</button>
        <button type="submit" id="modal-save">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirm -->
<div id="confirm-modal" class="modal hidden">
  <div class="modal-content small">
    <p>Delete this task?</p>
    <div class="modal-actions">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok" class="danger">Delete</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
